{% extends "base.html" %}
{% block content %}
<section class="auth-panel">
    <div>
        <p class="eyebrow">Healthcare coordination prototype</p>
        <h1>Welcome back</h1>
        <p>Sign in to manage fictional appointments, patient notes, staff tasks, messages, and feedback.</p>
    </div>
    <form method="post" class="form-card">
        <label>Email <input type="email" name="email" value="admin@medassist.test" required></label>
        <label>Password <input type="password" name="password" value="Password123!" required></label>
        <button type="submit">Log in</button>
        <a href="{{ url_for('register') }}">Create an account</a>
    </form>
</section>
{% endblock %}
